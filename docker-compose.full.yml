# Same as docker-compose.dock-pilot.yml (alias for install scripts).
# Bundled PostgreSQL + migrate + API + frontend.

services:
  postgres:
    image: ${POSTGRES_IMAGE:-dock-pilot-postgres:latest}
    container_name: dock-pilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dockpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-dockpilot}
    volumes:
      - dock_pilot_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dockpilot} -d ${POSTGRES_DB:-dockpilot}"]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 5s

  migrate:
    image: ${MIGRATE_IMAGE:-dock-pilot-migrate:latest}
    container_name: dock-pilot-migrate
    restart: "no"
    env_file:
      - .env
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: ${DATABASE_URL:?set DATABASE_URL in .env}
    depends_on:
      postgres:
        condition: service_healthy

  api:
    image: ${API_IMAGE:-dock-pilot-api:latest}
    container_name: dock-pilot-api
    restart: unless-stopped
    user: root
    pid: host
    cap_add:
      - SYS_ADMIN
    dns:
      - 8.8.8.8
      - 1.1.1.1
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in .env}
      HTTP_ADDR: ${HTTP_ADDR:-:8080}
      SECRETS_ENCRYPTION_KEY: ${SECRETS_ENCRYPTION_KEY:?set SECRETS_ENCRYPTION_KEY}
      API_TOKEN: ${API_TOKEN:?set API_TOKEN}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?set CORS_ALLOWED_ORIGINS}
      DEPLOY_MODE: ${DEPLOY_MODE:-real}
      DEPLOY_WORK_DIR: ${DEPLOY_WORK_DIR:-/var/lib/dock-pilot}
      HOST_ROOT: ${HOST_ROOT:-/host}
      NGINX_SITES_AVAILABLE: ${NGINX_SITES_AVAILABLE:-/host/etc/nginx/sites-available}
      NGINX_SITES_ENABLED: ${NGINX_SITES_ENABLED:-/host/etc/nginx/sites-enabled}
      CERTBOT_EMAIL: ${CERTBOT_EMAIL:?set CERTBOT_EMAIL}
    ports:
      - "127.0.0.1:${API_PORT:-8080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dock_pilot_work:${DEPLOY_WORK_DIR:-/var/lib/dock-pilot}
      - /:/host
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: ${FRONTEND_IMAGE:-dock-pilot-frontend:latest}
    container_name: dock-pilot-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - api

volumes:
  dock_pilot_pg:
  dock_pilot_work:
